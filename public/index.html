<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Link</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #ccc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
  .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid #1e1e1e; }
  .header h1 { font-size: 20px; color: #fff; font-weight: 600; }
  .header-btns { display: flex; gap: 8px; }
  .btn { padding: 6px 14px; border-radius: 8px; border: 1px solid #1e1e1e; background: none; color: #666; font-size: 12px; font-weight: 600; cursor: pointer; }
  .btn:hover { border-color: #333; color: #999; }
  .sidebar { position: fixed; top: 0; left: -320px; width: 320px; height: 100vh; background: #0a0a0a; border-right: 1px solid #1e1e1e; z-index: 100; transition: left 0.2s; display: flex; flex-direction: column; }
  .sidebar.open { left: 0; }
  .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; display: none; }
  .sidebar-overlay.open { display: block; }
  .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid #1e1e1e; }
  .sidebar-tabs { display: flex; gap: 4px; padding: 12px 16px; border-bottom: 1px solid #1e1e1e; flex-wrap: wrap; }
  .tab-btn { padding: 5px 10px; border-radius: 6px; border: 1px solid #333; background: none; color: #666; font-size: 12px; font-weight: 600; cursor: pointer; }
  .tab-btn.active { background: #4FC3F7; border-color: #4FC3F7; color: #000; }
  .sidebar-content { flex: 1; overflow-y: auto; padding: 16px; }
  .sidebar-close { background: none; border: none; color: #666; font-size: 18px; cursor: pointer; }
  .chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; }
  .msg { margin-bottom: 12px; padding: 12px 16px; border-radius: 12px; max-width: 80%; word-wrap: break-word; }
  .msg-user { background: #111; align-self: flex-end; margin-left: auto; border-bottom-right-radius: 4px; }
  .msg-assistant { background: #0a0a0a; border-left: 2px solid #4ade80; border-bottom-left-radius: 4px; }
  .msg-role { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; margin-bottom: 4px; }
  .msg-role-user { color: #555; }
  .msg-role-assistant { color: #4ade80; }
  .msg-text { font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
  .msg-img { max-width: 100%; max-height: 200px; border-radius: 8px; margin-bottom: 6px; }
  .thinking { color: #666; font-style: italic; padding: 12px; font-size: 13px; }
  .input-bar { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-top: 1px solid #1e1e1e; }
  .input-field { flex: 1; background: #111; border: 1px solid #1e1e1e; border-radius: 8px; padding: 10px 14px; color: #fff; font-size: 14px; outline: none; }
  .input-field::placeholder { color: #444; }
  .mic-btn { width: 44px; height: 44px; border-radius: 22px; border: none; background: #333; color: #e0e0e0; font-size: 14px; font-weight: 700; cursor: pointer; }
  .mic-btn.listening { background: #4ade80; color: #000; }
  .mic-btn.thinking { background: #fbbf24; color: #000; }
  .mic-btn.speaking { background: #4ade80; color: #000; }
  .send-btn { width: 44px; height: 44px; border-radius: 22px; border: none; background: #4FC3F7; color: #000; font-size: 14px; font-weight: 700; cursor: pointer; }
  .attach-btn { width: 36px; height: 36px; border-radius: 18px; border: 1px solid #1e1e1e; background: none; color: #666; font-size: 18px; cursor: pointer; }
  .pending-img { display: flex; align-items: center; gap: 10px; padding: 8px 16px; background: #0a0a0a; border-top: 1px solid #1e1e1e; }
  .pending-img img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
  .pending-img span { color: #999; font-size: 12px; flex: 1; }
  .pending-img button { background: none; border: none; color: #666; font-size: 16px; cursor: pointer; }
  .card { background: #111; border-radius: 10px; padding: 14px; margin-bottom: 10px; border: 1px solid #1e1e1e; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .card-name { color: #fff; font-size: 15px; font-weight: 700; }
  .card-badge { background: #1a3a4a; padding: 2px 7px; border-radius: 5px; color: #4FC3F7; font-size: 10px; font-weight: 600; }
  .card-desc { color: #999; font-size: 12px; line-height: 1.4; margin-bottom: 8px; }
  .card-actions { display: flex; gap: 8px; }
  .card-btn { padding: 6px 14px; border-radius: 7px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; }
  .card-btn-run { background: #4FC3F7; color: #000; }
  .card-btn-del { background: none; border: 1px solid #333; color: #666; }
  .empty { text-align: center; padding: 40px; color: #555; }
  .add-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .add-input { flex: 1; background: #111; border: 1px solid #1e1e1e; border-radius: 8px; padding: 10px; color: #fff; font-size: 13px; outline: none; }
  .add-input::placeholder { color: #444; }
  .add-btn { background: #4FC3F7; border: none; border-radius: 8px; padding: 10px 16px; color: #000; font-weight: 700; font-size: 13px; cursor: pointer; }
  .login-form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .login-form input { background: #0a0a0a; border: 1px solid #1e1e1e; border-radius: 8px; padding: 10px; color: #fff; font-size: 13px; outline: none; }
  .status-dot { width: 8px; height: 8px; border-radius: 4px; background: #333; margin-left: 8px; display: inline-block; }
  .status-dot.connected { background: #4ade80; }
  /* Artifact preview modal */
  .preview-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: none; flex-direction: column; }
  .preview-overlay.open { display: flex; }
  .preview-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid #1e1e1e; background: #0a0a0a; }
  .preview-title { color: #fff; font-size: 16px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .preview-btns { display: flex; gap: 8px; }
  .preview-btn { padding: 6px 14px; border-radius: 8px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; }
  .preview-btn-export { background: #4FC3F7; color: #000; }
  .preview-btn-tab { background: none; border: 1px solid #333; color: #999; }
  .preview-btn-close { background: none; border: 1px solid #333; color: #999; }
  .preview-iframe { flex: 1; border: none; background: #fff; }
</style>
</head>
<body>
<div class="sidebar-overlay" id="overlay"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header"><span style="color:#fff;font-weight:600">Menu</span><button class="sidebar-close" id="sidebarClose">X</button></div>
  <div class="sidebar-tabs" id="sidebarTabs"></div>
  <div class="sidebar-content" id="sidebarPanel"></div>
</div>
<div class="header">
  <div style="display:flex;align-items:center;gap:12px">
    <button class="btn" id="menuBtn" style="font-size:16px;padding:4px 8px">&#9776;</button>
    <h1>Brain Link</h1>
    <span class="status-dot" id="statusDot"></span>
  </div>
  <div class="header-btns"><button class="btn" id="newBtn">New</button></div>
</div>
<div class="chat" id="chat"></div>
<div class="pending-img" id="pendingImg" style="display:none">
  <img id="pendingImgPreview" src="" alt="preview">
  <span id="pendingImgLabel">Image ready</span>
  <button id="pendingImgClear">X</button>
</div>
<div class="input-bar">
  <button class="attach-btn" id="attachBtn">+</button>
  <input class="input-field" id="input" placeholder="Type or tap mic...">
  <button class="mic-btn" id="micBtn">MIC</button>
  <button class="send-btn" id="sendBtn">&#9654;</button>
</div>
<!-- Artifact Preview Modal -->
<div class="preview-overlay" id="previewOverlay">
  <div class="preview-header">
    <span class="preview-title" id="previewTitle"></span>
    <div class="preview-btns">
      <button class="preview-btn preview-btn-export" id="previewExportBtn">Export HTML</button>
      <button class="preview-btn preview-btn-tab" id="previewGithubBtn">Push to GitHub</button>
      <button class="preview-btn preview-btn-tab" id="previewTabBtn">Open in Tab</button>
      <button class="preview-btn preview-btn-close" id="previewCloseBtn">Close</button>
    </div>
  </div>
  <iframe class="preview-iframe" id="previewIframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
</div>
<script src="app.js"></script>
</body>
</html>
